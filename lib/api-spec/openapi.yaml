components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── AUTH ─────────────────────────────────────────────────────────────────

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    HospitalRegistrationInput:
      type: object
      required: [hospitalName, adminName, email, password, phone]
      properties:
        hospitalName:
