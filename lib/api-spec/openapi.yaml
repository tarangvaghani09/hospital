          type: string
        password:
          type: string
        phone:
          type: string
        address:
          type: string

    PatientRegistrationInput:
      type: object
      required: [name, email, password, phone, hospitalCode]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        hospitalCode:
          type: string
        dateOfBirth:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        address:
          type: ["string", "null"]

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    AuthResponse:
