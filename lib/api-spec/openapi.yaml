openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MediCore Hospital Management SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: hospitals
    description: Hospital management
  - name: users
    description: User management
  - name: patients
    description: Patient management
  - name: departments
    description: Department management
  - name: doctors
    description: Doctor management
  - name: appointments
    description: Appointment management
  - name: invoices
    description: Invoice management
  - name: prescriptions
    description: Prescription management
  - name: subscriptions
    description: Subscription plan management
  - name: reports
    description: Reports and analytics
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register-hospital:
    post:
      operationId: registerHospital
      tags: [auth]
      summary: Register new hospital
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalRegistrationInput"
      responses:
        "201":
          description: Hospital registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/register-patient:
    post:
      operationId: registerPatient
      tags: [auth]
      summary: Patient self-registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientRegistrationInput"
      responses:
        "201":
          description: Patient registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed

  # ─── SUPER ADMIN - HOSPITALS ─────────────────────────────────────────────────

  /admin/hospitals:
    get:
      operationId: listHospitals
      tags: [hospitals]
      summary: List all hospitals (super admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of hospitals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalList"

  /admin/hospitals/{id}:
    get:
      operationId: getHospital
      tags: [hospitals]
      summary: Get hospital details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hospital detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hospital"
    patch:
      operationId: updateHospitalByAdmin
      tags: [hospitals]
      summary: Update hospital (super admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalAdminUpdate"
      responses:
        "200":
          description: Updated hospital
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hospital"

  /admin/hospitals/{id}/status:
    patch:
      operationId: updateHospitalStatus
      tags: [hospitals]
      summary: Activate or deactivate hospital
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalStatusInput"
      responses:
        "200":
          description: Status updated

  /admin/dashboard:
    get:
      operationId: getSuperAdminDashboard
      tags: [dashboard]
      summary: Super admin dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminDashboard"

  /admin/support-tickets:
    get:
      operationId: listSupportTickets
      tags: [hospitals]
      summary: List support tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Support tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"

  /admin/support-tickets/{id}:
    patch:
      operationId: updateSupportTicket
      tags: [hospitals]
      summary: Update support ticket status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketUpdate"
      responses:
        "200":
          description: Ticket updated

  # ─── SUBSCRIPTION PLANS ─────────────────────────────────────────────────────

  /subscription-plans:
    get:
      operationId: listSubscriptionPlans
      tags: [subscriptions]
      summary: List all subscription plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"
    post:
      operationId: createSubscriptionPlan
      tags: [subscriptions]
      summary: Create subscription plan (super admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanInput"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlan"

  /subscription-plans/{id}:
    patch:
      operationId: updateSubscriptionPlan
      tags: [subscriptions]
      summary: Update subscription plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanUpdate"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlan"
    delete:
      operationId: deleteSubscriptionPlan
      tags: [subscriptions]
      summary: Delete subscription plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /hospital/subscription:
    get:
      operationId: getHospitalSubscription
      tags: [subscriptions]
      summary: Get current hospital subscription
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalSubscription"

  /hospital/subscription/upgrade:
    post:
      operationId: upgradeSubscription
      tags: [subscriptions]
      summary: Upgrade/downgrade subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionUpgradeInput"
      responses:
        "200":
          description: Subscription updated

  # ─── HOSPITAL PROFILE ────────────────────────────────────────────────────────

  /hospital/profile:
    get:
      operationId: getHospitalProfile
      tags: [hospitals]
      summary: Get hospital profile
      responses:
        "200":
          description: Hospital profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalProfile"
    patch:
      operationId: updateHospitalProfile
      tags: [hospitals]
      summary: Update hospital profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalProfile"

  /hospital/settings:
    get:
      operationId: getHospitalSettings
      tags: [hospitals]
      summary: Get hospital settings
      responses:
        "200":
          description: Hospital settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalSettings"
    patch:
      operationId: updateHospitalSettings
      tags: [hospitals]
      summary: Update hospital settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalSettingsUpdate"
      responses:
        "200":
          description: Updated settings

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────

  /hospital/dashboard:
    get:
      operationId: getHospitalDashboard
      tags: [dashboard]
      summary: Hospital admin dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalDashboard"

  /doctor/dashboard:
    get:
      operationId: getDoctorDashboard
      tags: [dashboard]
      summary: Doctor dashboard
      responses:
        "200":
          description: Doctor dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorDashboard"

  /receptionist/dashboard:
    get:
      operationId: getReceptionistDashboard
      tags: [dashboard]
      summary: Receptionist dashboard
      responses:
        "200":
          description: Receptionist dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceptionistDashboard"

  /patient/dashboard:
    get:
      operationId: getPatientDashboard
      tags: [dashboard]
      summary: Patient dashboard
      responses:
        "200":
          description: Patient dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDashboard"

  # ─── DEPARTMENTS ─────────────────────────────────────────────────────────────

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List departments
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DOCTORS ─────────────────────────────────────────────────────────────────

  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List doctors
      parameters:
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"
    post:
      operationId: createDoctor
      tags: [doctors]
      summary: Create doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
    patch:
      operationId: updateDoctor
      tags: [doctors]
      summary: Update doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
    delete:
      operationId: deleteDoctor
      tags: [doctors]
      summary: Delete doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /doctors/{id}/schedule:
    get:
      operationId: getDoctorSchedule
      tags: [doctors]
      summary: Get doctor schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DoctorSchedule"
    put:
      operationId: updateDoctorSchedule
      tags: [doctors]
      summary: Update doctor schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorScheduleInput"
      responses:
        "200":
          description: Schedule updated

  # ─── RECEPTIONISTS ──────────────────────────────────────────────────────────

  /receptionists:
    get:
      operationId: listReceptionists
      tags: [users]
      summary: List receptionists
      responses:
        "200":
          description: Receptionists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receptionist"
    post:
      operationId: createReceptionist
      tags: [users]
      summary: Create receptionist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceptionistInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receptionist"

  /receptionists/{id}:
    patch:
      operationId: updateReceptionist
      tags: [users]
      summary: Update receptionist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceptionistUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receptionist"
    delete:
      operationId: deleteReceptionist
      tags: [users]
      summary: Delete receptionist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PATIENTS ────────────────────────────────────────────────────────────────

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientList"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
